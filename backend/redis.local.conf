port 6379
bind 127.0.0.1
protected-mode yes

# Keep Redis persistence in the project instead of the process launch directory.
# The portable Windows Redis build otherwise starts in C:\Windows\system32 when
# launched from some shells/shortcuts, which causes MISCONF when dump.rdb cannot
# be written there.
dir ./redis-data
dbfilename dump.rdb

save 3600 1 300 100 60 10000
stop-writes-on-bgsave-error yes
appendonly no
